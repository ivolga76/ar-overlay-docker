version: '3.8'

services:
  app:
    build: .
    container_name: ar-overlay
    ports:
      - '3001:3001'
    volumes:
      - app_data:/app/.data
    restart: always
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  app_data:
