version: '3.8'

services:
  app:
    build: .
    container_name: ar-overlay
    ports:
      - '3001:3001'
    volumes:
      - app_data:/app/.data
    restart: always
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  leaderboard:
    build: ./leaderboard
    container_name: ar-overlay-leaderboard
    ports:
      - '3002:3002'
    restart: always
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - API_URL=http://app:3001
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      - app

volumes:
  app_data:
